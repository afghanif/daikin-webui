<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Body -->
  <ellipse cx="100" cy="140" rx="60" ry="70" fill="#0097E0"/>
  <!-- Belly -->
  <ellipse cx="100" cy="150" rx="38" ry="48" fill="#ffffff"/>
  <!-- Head -->
  <circle cx="100" cy="72" r="48" fill="#0097E0"/>
  <!-- Face white patch -->
  <ellipse cx="100" cy="76" rx="30" ry="28" fill="#ffffff"/>
  <!-- Eyes happy/helping -->
  <path d="M84 65 Q88 58 92 65" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M108 65 Q112 58 116 65" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Big smile -->
  <path d="M86 80 Q100 96 114 80" stroke="#1A1A2E" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Beak -->
  <ellipse cx="100" cy="87" rx="10" ry="7" fill="#F5A623"/>
  <!-- Both arms raised/helping -->
  <ellipse cx="44" cy="110" rx="18" ry="10" fill="#0097E0" transform="rotate(-70 44 110)"/>
  <ellipse cx="156" cy="110" rx="18" ry="10" fill="#0097E0" transform="rotate(70 156 110)"/>
  <!-- Feet -->
  <ellipse cx="82" cy="205" rx="20" ry="10" fill="#F5A623"/>
  <ellipse cx="118" cy="205" rx="20" ry="10" fill="#F5A623"/>
  <!-- Cheeks -->
  <circle cx="80" cy="80" r="8" fill="#4DC0F0" opacity="0.5"/>
  <circle cx="120" cy="80" r="8" fill="#4DC0F0" opacity="0.5"/>
  <!-- Small stars/sparkles -->
  <text x="20" y="90" font-size="18" fill="#F5A623">✦</text>
  <text x="155" y="85" font-size="14" fill="#F5A623">✦</text>
</svg>
